exten => s,n,ExecIf($["${HASH(dialparties,FINALDS)}" != "" & ${REGEX("&$" ${HASH(dialparties,FINALDS)})}]?Set(HASH(dialparties,FINALDS)=${HASH(dialparties,FINALDS):0:-1}))
